syntax = "proto3";

option csharp_namespace = "PersonService.Api";

import "google/protobuf/timestamp.proto";

message Person {
  string id            = 1;
  string first_name    = 2;
  string last_name     = 3;
  string national_code = 4;
  google.protobuf.Timestamp birth_date = 5;
}

message CreatePersonRequest { Person person = 1; }
message GetPersonByIdRequest { string id = 1; }
message UpdatePersonRequest { Person person = 1; }
message DeletePersonRequest { string id = 1; }

message Empty {}

service PersonService {
  rpc Create(CreatePersonRequest) returns (Person);
  rpc GetById(GetPersonByIdRequest) returns (Person);
  rpc Update(UpdatePersonRequest) returns (Person);
  rpc Delete(DeletePersonRequest) returns (Empty);
}
